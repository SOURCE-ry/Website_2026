<!DOCTYPE html>
<html>
<head>
<title>SOURCE ry</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" type="text/css" href="/resources/css/style.css">
<link rel="icon" type="image/x-icon" href="/resources/images/favicon.ico">
</head>
<body>
    <header class="nav-header">
        <nav class="nav-inner">
            <a href="./" class="nav-logo">
                <img src="/resources/images/favicon.ico" alt="SOURCE ry logo" />
            </a>
            <nav class="nav-links">
                <a href="./partners" class="nav-trigger" data-translate="partners"></a>
                <a href="./events" class="nav-trigger" data-translate="events"></a>
                <a href="./titelan" class="nav-trigger" data-translate="titelan"></a>
                <a href="./students" class="nav-trigger" data-translate="students"></a>
                <a href="./about" class="nav-trigger" data-translate="about"></a>
                <a href="./contact" class="nav-trigger" data-translate="contact"></a>
            </nav>
            <nav class="nav-right">
                <button class="nav-lang-button" id="lang-button" type="button" data-translate="langButton"></button>
            </nav>
        </nav>
    </header>
    <section class="separator-5px"></section>
    <section class="all-sections">
        <section class="hero-section">
            <img src="/resources/images/hero.png" alt="SOURCE ry hero image" />
        </section>
        <section class="content-section">
            <h1>SOURCE ry</h1>
            <p data-translate="home.subtitle"></p>
        </section>
        <aside class="aside-section">
            <h2 data-translate="home.aside.title"></h2>
            <p data-translate="home.aside.text"></p>
        </aside>
    </section>
    <footer id="footer">
        <p>
            <script>document.write(new Date().getFullYear())</script>
            <span id="spanYear" data-translate="footer.text"></span>
        </p>
    </footer>
    <script type="module" src="/resources/js/translation.js" defer></script>
</body>
</html>
